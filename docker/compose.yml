services:
  # --- PROXY REVERSO (Caddy) ---
  caddy:
    image: lucaslorentz/caddy-docker-proxy:ci-alpine
    container_name: logisteia-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CADDY_INGRESS_NETWORKS=caddy
    networks:
      - caddy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy_data:/data
    restart: unless-stopped

  # --- BASE DE DATOS (MySQL) ---
  db:
    image: mysql:8.0
    container_name: logisteia-db
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - logisteia-net

  # --- PHPMYADMIN ---
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: logisteia-pma
    restart: always
    environment:
      PMA_HOST: db
      PMA_ABSOLUTE_URI: https://${PMA_DOMAIN}/
    networks:
      - logisteia-net
      - caddy
    labels:
      caddy: ${PMA_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 80}}"

  # --- BACKEND (PHP PURO) ---
  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    container_name: logisteia-backend
    restart: always
    networks:
      - logisteia-net
      - caddy
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
    labels:
      caddy: ${API_DOMAIN}
      # PHP-Apache usa el puerto 80, no el 8080
      caddy.reverse_proxy: "{{upstreams 80}}" 

  # --- FRONTEND (ANGULAR) ---
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: logisteia-frontend
    restart: always
    networks:
      - caddy
    labels:
      caddy: ${DOMAIN}, www.${DOMAIN}
      caddy.reverse_proxy: "{{upstreams 80}}"

volumes:
  caddy_data:
  db_data:

networks:
  caddy:
    external: true
  logisteia-net:
    driver: bridge