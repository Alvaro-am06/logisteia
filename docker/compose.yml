services:
  # Base de datos MySQL
  db:
    image: mysql:8.0
    container_name: logisteia_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password --bind-address=0.0.0.0
    environment:
      MYSQL_DATABASE: Logisteia
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_HOST: '%'
    volumes:
      - db_data:/var/lib/mysql
      - ../src/sql/bbdd.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - logisteia_network

  # Backend PHP con Apache
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: logisteia_backend
    restart: always
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: Logisteia
      DB_USER: root
      DB_PASS: ${DB_PASS}
    networks:
      - logisteia_network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: logisteia_pma
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
    depends_on:
      - db
    networks:
      - logisteia_network

configs:
  caddy_config:
    content: |
      logisteia.com {
        root * /usr/share/caddy
        try_files {path} {path}/ /index.html
        reverse_proxy /api/* logisteia_backend:80
      }
      pma.logisteia.com {
        reverse_proxy logisteia_pma:80
      }

volumes:
  db_data:

networks:
  logisteia_network:
    driver: bridge