services:
  # Base de datos MySQL 8.0
  db:
    image: mysql:8.0
    container_name: logisteia_db
    restart: always
    environment:
      MYSQL_DATABASE: Logisteia
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_USER: logisteia_user
      MYSQL_PASSWORD: ${DB_USER_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./src/sql/bbdd.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./src/sql/datos_iniciales.sql:/docker-entrypoint-initdb.d/02-data.sql
    networks:
      - logisteia_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend Spring Boot 4.0.6 con Java 25
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: logisteia_backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/Logisteia
      SPRING_DATASOURCE_USERNAME: logisteia_user
      SPRING_DATASOURCE_PASSWORD: ${DB_USER_PASS}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - logisteia_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      timeout: 20s
      retries: 10

  # Frontend Angular 21 + Nginx (proxy reverso)
  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: logisteia_web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL certificates (opcional - descomentar cuando tengas certificados)
      # - ./certs/cert.pem:/etc/nginx/ssl/cert.pem:ro
      # - ./certs/key.pem:/etc/nginx/ssl/key.pem:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - logisteia_network

  # phpMyAdmin para gestión de base de datos (opcional)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: logisteia_pma
    restart: always
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_PASS}
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - logisteia_network

volumes:
  db_data:

networks:
  logisteia_network:
    driver: bridge