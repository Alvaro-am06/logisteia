include:
  - docker/backend/compose.backend.yml
  - docker/frontend/compose.frontend.yml
  - docker/caddy/compose.caddy.yml

services:
  # Base de datos MySQL
  db:
    image: mysql:8.0
    container_name: logisteia_db
    restart: always
    environment:
      MYSQL_DATABASE: Logisteia
    networks:
      - logisteia_network

volumes:
  db_data:
  caddy_data:
  caddy_config:

networks:
  logisteia_network:
    driver: bridge