spring:
  application:
    name: logisteia-backend

  # Configuración de Base de Datos - PRODUCCIÓN
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:Logisteia}?useSSL=${DB_USE_SSL:true}&serverTimezone=UTC&allowPublicKeyRetrieval=false&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048
    username: ${DB_USER:logisteia_user}
    password: ${DB_PASS:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000

  # Configuración JPA/Hibernate - PRODUCCIÓN
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 25
          fetch_size: 100
          batch_versioned_data: true
          use_get_generated_keys: true
        order_inserts: true
        order_updates: true
        # Optimizaciones de producción
        generate_statistics: false
        session.events.log: false

  # Configuración de Jackson (serialización JSON)
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false

# Configuración del Servidor - PRODUCCIÓN
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-message: always
    include-binding-errors: when_param
    include-stacktrace: never
    include-exception: false
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 20
    accept-count: 100
    max-connections: 10000
    connection-timeout: 20000ms
    keep-alive-timeout: 60s
    max-keep-alive-requests: 100

# Logging - PRODUCCIÓN (WARN)
logging:
  level:
    root: WARN
    com.logisteia.backend: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:/var/log/logisteia/app.log}
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB

# Actuator - PRODUCCIÓN (solo health, info, metrics)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      enabled: true
    info:
      enabled: true
    metrics:
      enabled: true
  metrics:
    export:
      simple:
        enabled: true

# JWT Configuration - PRODUCCIÓN
app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}

  # CORS - PRODUCCIÓN
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://tu-dominio.com}
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: Authorization,Content-Type
    allow-credentials: true
    max-age: 3600

# Lifecycle
spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
